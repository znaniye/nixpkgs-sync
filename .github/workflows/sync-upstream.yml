name: Sync nixpkgs fork with upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"branch":"master"}' \
            https://api.github.com/repos/znaniye/nixpkgs/merge-upstream
